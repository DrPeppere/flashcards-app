<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcards App</title>
    
    <!-- App Capable Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#09090b"> <!-- zinc-950 background color -->

    <!-- Embedded App Icon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23a1a1aa'%3E%3Cpath d='M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6zm2 0v12h12V6H6zm2 3h8v2H8V9zm0 4h5v2H8v-2z'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23a1a1aa'%3E%3Cpath d='M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6zm2 0v12h12V6H6zm2 3h8v2H8V9zm0 4h5v2H8v-2z'/%3E%3C/svg%3E">

    <!-- Tailwind CSS & Config for Dark Mode -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        };
    </script>
    
    <!-- Prevent flash of unstyled theme -->
    <script>
        if (localStorage.getItem('flashcard_theme') === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Prevents mobile browser pull-to-refresh and bounce */
        body {
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* Card Transition Animations */
        @keyframes cardNext {
            0% { opacity: 0; transform: translateX(40px) scale(0.95); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes cardPrev {
            0% { opacity: 0; transform: translateX(-40px) scale(0.95); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }
        .anim-next { animation: cardNext 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .anim-prev { animation: cardPrev 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        /* Custom Scrollbar for smaller elements */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #d4d4d8;
            border-radius: 10px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #3f3f46;
        }

        /* Hide scrollbar completely for horizontal tab list */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-200 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- GITHUB CONFIGURATION ---
        const GITHUB_USER = "DrPeppere"; 
        const GITHUB_REPO = "flashcard-databank";
        const GITHUB_BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/`;

        // --- SVGs / Icons ---
        const Icon = ({ children, size = 24, fill = "none", stroke = "currentColor", className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={stroke} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const ChevronLeft = ({size}) => <Icon size={size}><polyline points="15 18 9 12 15 6"></polyline></Icon>;
        const ChevronRight = ({size}) => <Icon size={size}><polyline points="9 18 15 12 9 6"></polyline></Icon>;
        const RotateCcw = ({size}) => <Icon size={size}><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></Icon>;
        const Settings = ({size}) => <Icon size={size}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></Icon>;
        const AlertCircle = ({size, className}) => <Icon size={size} className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></Icon>;
        const Upload = ({size, className}) => <Icon size={size} className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></Icon>;
        const FileCode = ({size}) => <Icon size={size}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><polyline points="10 13 8 15 10 17"></polyline><polyline points="14 13 16 15 14 17"></polyline></Icon>;
        const MenuIcon = ({size}) => <Icon size={size}><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></Icon>;
        const X = ({size}) => <Icon size={size}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></Icon>;
        const Star = ({size, fill, className}) => <Icon size={size} fill={fill} className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></Icon>;
        const FolderPlus = ({size}) => <Icon size={size}><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line></Icon>;
        const Folder = ({size, className}) => <Icon size={size} className={className}><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></Icon>;
        const GripVertical = ({size}) => <Icon size={size}><circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="19" r="1"></circle></Icon>;
        const CheckCircle = ({size, className}) => <Icon size={size} className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></Icon>;
        const Trash2 = ({size, className}) => <Icon size={size} className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></Icon>;
        const BookOpen = ({size, className}) => <Icon size={size} className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></Icon>;
        const Clock = ({size, className}) => <Icon size={size} className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></Icon>;
        const Edit2 = ({size, className}) => <Icon size={size} className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></Icon>;
        const Home = ({size, className}) => <Icon size={size} className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></Icon>;
        const Sun = ({size, className}) => <Icon size={size} className={className}><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></Icon>;
        const Moon = ({size, className}) => <Icon size={size} className={className}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></Icon>;
        const Smartphone = ({size, className}) => <Icon size={size} className={className}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></Icon>;
        const Monitor = ({size, className}) => <Icon size={size} className={className}><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></Icon>;
        const Plus = ({size, className}) => <Icon size={size} className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></Icon>;
        const RefreshCw = ({size, className}) => <Icon size={size} className={className}><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></Icon>;
        const Download = ({size, className}) => <Icon size={size} className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></Icon>;
        const Layers = ({size, className}) => <Icon size={size} className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></Icon>;

        // --- Main App Component ---
        function App() {
            const [view, setView] = useState('setup'); // 'setup' or 'study'
            
            // App Theme
            const [theme, setTheme] = useState(() => {
                return localStorage.getItem('flashcard_theme') || 'dark';
            });
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [showCreateDeckModal, setShowCreateDeckModal] = useState(false);
            const [newDeckDetails, setNewDeckDetails] = useState({ name: '', subj: '', doc: '' });

            // Combine Deck State
            const [showCombineModal, setShowCombineModal] = useState(false);
            const [decksToCombine, setDecksToCombine] = useState([]); // Array of deck IDs to merge
            const [combineDeckName, setCombineDeckName] = useState('');
            const combineDragItem = useRef(null);
            const combineDragOverItem = useRef(null);

            // Rename Deck State
            const [editingDeckId, setEditingDeckId] = useState(null);
            const [editDeckName, setEditDeckName] = useState('');

            // Library State (GitHub Database)
            const [libraryDecks, setLibraryDecks] = useState([]);
            const [isLibraryLoading, setIsLibraryLoading] = useState(false);
            const [libraryError, setLibraryError] = useState('');
            const [isInstalling, setIsInstalling] = useState(null);

            // Load saved decks from localStorage on initialization
            const [savedDecks, setSavedDecks] = useState(() => {
                const saved = localStorage.getItem('flashcard_decks');
                return saved ? JSON.parse(saved) : [];
            });
            const [currentDeckId, setCurrentDeckId] = useState(null);

            const [allCards, setAllCards] = useState([]);
            // Manage folders (Favorites is just the default folder)
            const [folders, setFolders] = useState([]); 
            const [mastered, setMastered] = useState([]); // Array of mastered card IDs
            const [filter, setFilter] = useState('all'); // 'all', 'mastered', or folder id
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [subjectLabel, setSubjectLabel] = useState('PHYS');
            const [docLabel, setDocLabel] = useState('CH10_12_SG');
            
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [slideDirection, setSlideDirection] = useState('next'); // 'next', 'prev', or 'none'
            const [error, setError] = useState('');
            const [isDragging, setIsDragging] = useState(false);
            
            const [editingCard, setEditingCard] = useState(null); // Holds the card currently being edited
            const [showFolderModal, setShowFolderModal] = useState(false); // Controls the "Manage folders" modal
            const [savingCardId, setSavingCardId] = useState(null); // Controls the "Save to folder" modal for a specific card
            const [newFolderName, setNewFolderName] = useState('');
            const [reviewItems, setReviewItems] = useState([]); // Queue for "Try Again" functionality

            // Drag Over Target ID for Header Tabs
            const [dragOverFolderId, setDragOverFolderId] = useState(null);

            // Drag and drop sorting refs
            const dragItem = useRef(null);
            const dragOverItem = useRef(null);

            // Sync theme to document class
            useEffect(() => {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                localStorage.setItem('flashcard_theme', theme);
            }, [theme]);

            // Fetch Library from GitHub on mount
            useEffect(() => {
                fetchLibrary();
            }, []);

            // Clear transient review queue when switching decks or folders
            useEffect(() => {
                setReviewItems([]);
            }, [filter, currentDeckId]);

            // Auto-save progress and card data to localStorage whenever it changes
            useEffect(() => {
                if (currentDeckId) { // Only require currentDeckId, allCards can be empty!
                    setSavedDecks(prevDecks => {
                        const updatedDecks = prevDecks.map(deck => {
                            if (deck.id === currentDeckId) {
                                return { 
                                    ...deck, 
                                    currentIndex, 
                                    folders,
                                    mastered,
                                    cards: allCards, // Save any edits to the cards
                                    lastAccessed: Date.now()
                                };
                            }
                            return deck;
                        });
                        localStorage.setItem('flashcard_decks', JSON.stringify(updatedDecks));
                        return updatedDecks;
                    });
                }
            }, [currentIndex, folders, mastered, currentDeckId, allCards]);

            // Determine active cards based on current filter state and review queue
            const activeCards = useMemo(() => {
                if (filter === 'mastered') {
                    return allCards.filter(c => mastered.includes(c.id));
                }
                
                let base = allCards;
                if (filter !== 'all' && filter !== 'mastered') {
                    const folder = folders.find(f => f.id === filter);
                    if (folder) {
                        // Return cards matching folder order
                        base = folder.cards
                            .map(id => allCards.find(c => c.id === id))
                            .filter(Boolean); // Clean out any invalid mappings
                    }
                }
                
                // Default view handling: remove mastered cards from base
                base = base.filter(c => !mastered.includes(c.id));

                // Dynamically splice in "Try Again" review items based on their designated target indices
                let merged = [...base];
                reviewItems.forEach(item => {
                    const activeId = item.card.originalId || item.card.id;
                    // If the user has permanently mastered the card, it shouldn't show up in the review queue
                    if (!mastered.includes(activeId)) {
                        const idx = Math.min(item.insertAt, merged.length);
                        merged.splice(idx, 0, item.card);
                    }
                });

                return merged;
            }, [allCards, mastered, filter, folders, reviewItems]);

            // Clamp currentIndex if the activeCards list shrinks
            useEffect(() => {
                if (activeCards.length > 0 && currentIndex >= activeCards.length) {
                    setCurrentIndex(activeCards.length - 1);
                }
            }, [activeCards.length, currentIndex]);

            // Keyboard navigation
            useEffect(() => {
                const handleKeyDown = (e) => {
                    // Disable keyboard nav if we aren't studying or if we are actively typing in an edit/folder modal
                    if (view !== 'study' || editingCard || showSettingsModal || showFolderModal || savingCardId || showCreateDeckModal || showCombineModal || editingDeckId) return; 
                    
                    if (e.key === 'ArrowRight') {
                        handleNext();
                    } else if (e.key === 'ArrowLeft') {
                        handlePrev();
                    } else if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === ' ') {
                        e.preventDefault();
                        setIsFlipped((prev) => !prev);
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [view, currentIndex, activeCards.length, editingCard, showSettingsModal, showFolderModal, savingCardId, showCreateDeckModal, showCombineModal, editingDeckId]);

            // File Upload Handlers
            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragging(true);
            };

            const handleDragLeave = (e) => {
                e.preventDefault();
                setIsDragging(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                const file = e.dataTransfer.files[0];
                if (file) processFile(file);
            };

            const handleFileInput = (e) => {
                const file = e.target.files[0];
                if (file) processFile(file);
            };

            // Safely fetch library explicitly from GitHub Base
            const fetchLibrary = async () => {
                if (GITHUB_USER === "YOUR_USERNAME") return; 
                setIsLibraryLoading(true);
                setLibraryError('');
                try {
                    // We bypass relative paths completely to prevent Blob/Local fetch errors
                    const response = await fetch(GITHUB_BASE + 'catalog.json');
                    if (!response.ok) {
                         throw new Error("Could not find catalog.json in your repo.");
                    }
                    const catalog = await response.json();
                    setLibraryDecks(catalog);
                } catch (err) {
                    console.error(err);
                    setLibraryError("Couldn't connect to GitHub library.");
                } finally {
                    setIsLibraryLoading(false);
                }
            };

            const installLibraryDeck = async (libraryDeck) => {
                setIsInstalling(libraryDeck.file);
                try {
                    // Fetch exclusively from the Github repo
                    const response = await fetch(GITHUB_BASE + libraryDeck.file);
                    if (!response.ok) throw new Error("File not found");
                    const rawCards = await response.json();
                    
                    const formattedCards = rawCards.map((c, i) => ({
                        id: `card_${Date.now()}_${Math.random().toString(36).substring(2,7)}_${i}`,
                        subj: libraryDeck.subject || "SUBJ",
                        doc: libraryDeck.doc || "DOC",
                        sec: c.sec || '',
                        q: c.q || '',
                        a: c.a || ''
                    }));

                    const newDeck = {
                        id: 'deck_' + Date.now(),
                        name: libraryDeck.name,
                        subjectLabel: libraryDeck.subject || "SUBJ",
                        docLabel: libraryDeck.doc || "DOC",
                        cards: formattedCards,
                        folders: [{ id: 'favorites', name: 'Favorites', cards: [] }],
                        mastered: [],
                        currentIndex: 0,
                        lastAccessed: Date.now()
                    };

                    setSavedDecks(prev => {
                        const updated = [newDeck, ...prev];
                        localStorage.setItem('flashcard_decks', JSON.stringify(updated));
                        return updated;
                    });
                    
                    // Stay on dashboard visually
                } catch (err) {
                    alert("Failed to install deck: " + err.message);
                } finally {
                    setIsInstalling(null);
                }
            };

            const loadDeck = (deck) => {
                setAllCards(deck.cards);
                setSubjectLabel(deck.subjectLabel);
                setDocLabel(deck.docLabel);
                
                // Backwards compatibility migration for old decks
                const loadedFolders = deck.folders || (
                    deck.favorites ? [{ id: 'favorites', name: 'Favorites', cards: deck.favorites }] : [{ id: 'favorites', name: 'Favorites', cards: [] }]
                );
                
                setFolders(loadedFolders);
                setMastered(deck.mastered || []);
                setCurrentIndex(deck.currentIndex || 0);
                setCurrentDeckId(deck.id);
                setFilter('all');
                setSlideDirection('next');
                setView('study');
                
                // Update last accessed immediately
                setSavedDecks(prev => {
                    const updated = prev.map(d => d.id === deck.id ? { ...d, lastAccessed: Date.now() } : d);
                    localStorage.setItem('flashcard_decks', JSON.stringify(updated));
                    return updated;
                });
            };

            // Export logic converting back to HTML string
            const handleExportDeck = (deck, e) => {
                e.stopPropagation();
                
                const cardsJSON = deck.cards.map((c, i) => ({
                    id: i + 1, // Reset integers for neatness when exported
                    subj: c.subj || deck.subjectLabel || "SUBJ",
                    doc: c.doc || deck.docLabel || "DOC",
                    sec: c.sec || '',
                    q: c.q || '',
                    a: c.a || ''
                }));
                // Add the expected END marker
                cardsJSON.push({ id: "END", subj: "END", doc: "END", sec: "END", q: "END", a: "END" });

                const htmlContent = `<!DOCTYPE html><html><head><title>${deck.name}</title><style>
    body { font-family: sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
    h1 { text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; background-color: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }

            const processFile = (file) => {
                setError('');
                
                if (!file.name.toLowerCase().endsWith('.html')) {
                    setError('Please upload a valid .html file.');
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                const content = e.target.result;
                try {
                    // 1. Find the start of the array
                    const arrayStartIndicator = 'const cardsData = [';
                    const startIdx = content.indexOf(arrayStartIndicator);
                    if (startIdx === -1) throw new Error("Could not find 'cardsData' array in the file.");
                    
                    // 2. Find the end of the array 
                    const endIdx = content.indexOf('];', startIdx);
                    if (endIdx === -1) throw new Error("Could not find the end of the 'cardsData' array.");

                    // Extract just the array string e.g. "[{...}, {...}]"
                    let arrayString = content.substring(startIdx + arrayStartIndicator.length - 1, endIdx + 1).trim();

                    // 3. Parse the array into Javascript objects
                    const parsedCardsRaw = new Function('return ' + arrayString)();
                    
                    if (!Array.isArray(parsedCardsRaw) || parsedCardsRaw.length === 0) {
                        throw new Error("The extracted data is not a valid array of flashcards.");
                    }

                    // 4. Filter out the "END" dummy card
                    const validCards = parsedCardsRaw.filter(c => c.id !== "END" && c.q !== "END");
                    
                    if (validCards.length === 0) {
                         throw new Error("No valid flashcards found in the file.");
                    }

                    // 5. Overwrite the integer id with a unique string for the app's internal logic
                    const parsedCardsWithIds = validCards.map((c, i) => ({ 
                        ...c, 
                        id: `card_${Date.now()}_${i}` 
                    }));

                    // 6. Extract the labels from the very first valid card
                    const newSubjectLabel = validCards[0].subj || 'SUBJ';
                    const newDocLabel = validCards[0].doc || 'DOC';

                    const newDeck = {
                        id: 'deck_' + Date.now(),
                        name: newDocLabel !== 'DOC' ? newDocLabel : file.name.replace('.html', ''),
                        subjectLabel: newSubjectLabel,
                        docLabel: newDocLabel,
                        cards: parsedCardsWithIds,
                        folders: [{ id: 'favorites', name: 'Favorites', cards: [] }], // Default folder config
                        mastered: [],
                        currentIndex: 0,
                        lastAccessed: Date.now()
                    };

                    setSavedDecks(prev => {
                        const updated = [newDeck, ...prev];
                        localStorage.setItem('flashcard_decks', JSON.stringify(updated));
                        return updated;
                    });

                    // Stays on dashboard

                } catch (err) {
                    setError(err.message || 'Failed to parse the file. Ensure it is formatted correctly.');
                    console.error(err);
                }
                };
                reader.onerror = () => setError('Failed to read the file.');
                reader.readAsText(file);
            };

            const handleNext = () => {
                if (currentIndex < activeCards.length - 1) {

                }
            };

            const handlePrev = () => {
                if (currentIndex > 0) {

                setMastered(prev => {

                if (filter !== 'mastered') {

                        setCurrentIndex(currentIndex - 1);

            const handleTryAgain = (e) => {
                e.stopPropagation();
                // Ensure we handle currentCard correctly even if it's already a review card

                    }];

                const draggedCard = activeCards[dragItem.current];
                const dragOverCard = activeCards[dragOverItem.current];

                                let insertIdx = folderCards.length;

            const onTouchMove = (e) => {
                if (!touchStartX.current || !touchStartY.current) return;
                
                const diffX = touchStartX.current - e.touches[0].clientX;
                const diffY = touchStartY.current - e.touches[0].clientY;

                if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 10) {
                    isSwiping.current = true;

            };

            const onTouchEnd = (e) => {
                if (!touchStartX.current) return;

                                <button 
                                    onClick={(e) => toggleMastered(activeIdForActions, e)}
                                    className={`p-2 rounded-full transition-colors ${isMastered ? 'text-emerald-600 dark:text-emerald-400 bg-emerald-100 dark:bg-emerald-500/20 hover:bg-emerald-200 dark:hover:bg-emerald-500/30' : 'text-zinc-400 hover:text-zinc-900 hover:bg-zinc-200 dark:text-zinc-500 dark:hover:text-zinc-300 dark:hover:bg-zinc-700'}`}
                                    title={isMastered ? "Unmark Mastered" : "Mark as Mastered (Eliminate)"}
                                >
                                    <CheckCircle size={22} />
                                </button>
                            </div>

                            {/* Corner Labels */}
                            <div className="absolute top-5 left-5 flex items-center gap-2">
                                <span className="text-xs font-mono text-zinc-500 dark:text-zinc-400">{currentIndex + 1}</span>
                                <span className="text-xs font-mono text-zinc-500 dark:text-zinc-400 font-bold">{subjectLabel}</span>
                            </div>
                            <div className="absolute bottom-5 left-5 text-xs font-mono text-zinc-500 dark:text-zinc-400">{docLabel}</div>
                            <div className="absolute bottom-5 right-5 text-xs font-mono text-zinc-500 dark:text-zinc-400">{currentCard.sec}</div>
                            
                            <div className="flex-1 overflow-y-auto mt-10 mb-10 px-2 flex flex-col custom-scrollbar">
                                <p className="m-auto text-lg sm:text-xl md:text-2xl text-zinc-800 dark:text-zinc-100 font-bold leading-relaxed">
                                {currentCard.a}
                                </p>
                            </div>
                            </div>
                        </div>
                        </div>

                        {/* Desktop Next Button */}
                        <button 
                        onClick={handleNext}
                        disabled={currentIndex === activeCards.length - 1}
                        className="hidden sm:flex absolute right-4 md:right-8 p-4 bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-full shadow-lg text-zinc-500 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-700 hover:text-zinc-900 dark:hover:text-white disabled:opacity-30 disabled:cursor-not-allowed transition-all active:scale-95 z-10"
                        >
                        <ChevronRight size={32} />
                        </button>
                    </div>
                    )}

                    {/* Bottom Navigation Slider */}
                    {activeCards.length > 0 && (
                    <div className="w-full max-w-lg mt-8 mb-4 sm:mb-0 flex flex-col gap-3 z-10 px-2">
                        <div className="flex justify-between items-center text-xs font-bold text-zinc-600 dark:text-zinc-400">
                        <span className="w-8">1</span>
                        <span className="text-zinc-800 bg-white border border-zinc-200 dark:text-zinc-200 dark:bg-zinc-800 dark:border-zinc-700 px-3 py-1.5 rounded-full shadow-sm tracking-wide transition-colors duration-300">
                            SECTION {currentCard.sec || 'N/A'}
                        </span>
                        <span className="w-8 text-right">{activeCards.length}</span>
                        </div>
                        <input
                        type="range"
                        min={0}
                        max={activeCards.length > 0 ? activeCards.length - 1 : 0}
                        value={currentIndex}
                        onChange={(e) => {
                            const newIndex = Number(e.target.value);
                            setSlideDirection('none'); // Instant transition
                            setCurrentIndex(newIndex);
                            setIsFlipped(false);
                        }}
                        className="w-full h-2.5 bg-zinc-200 dark:bg-zinc-800 rounded-lg appearance-none cursor-pointer accent-zinc-600 dark:accent-zinc-400 focus:outline-none focus:ring-4 focus:ring-zinc-500/30 transition-all duration-300"
                        />
                    </div>
                    )}

                </main>

                {/* Mobile Footer Guide */}
                <footer className="sm:hidden bg-white dark:bg-zinc-900 border-t border-zinc-200 dark:border-zinc-800 p-4 text-center text-sm text-zinc-500 dark:text-zinc-400 flex justify-between items-center pb-8 transition-colors duration-300">
                    <span>← Swipe Prev</span>
                    <span className="flex items-center gap-1 font-bold"><RotateCcw size={14} /> Tap to Flip</span>
                    <span>Swipe Next →</span>
                </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
