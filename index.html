<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcards App</title>
    
    <!-- App Capable Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#09090b"> <!-- zinc-950 background color -->

    <!-- Embedded App Icon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23a1a1aa'%3E%3Cpath d='M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6zm2 0v12h12V6H6zm2 3h8v2H8V9zm0 4h5v2H8v-2z'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23a1a1aa'%3E%3Cpath d='M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6zm2 0v12h12V6H6zm2 3h8v2H8V9zm0 4h5v2H8v-2z'/%3E%3C/svg%3E">

    <!-- Tailwind CSS & Config for Dark Mode -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        };
    </script>
    
    <!-- Prevent flash of unstyled theme -->
    <script>
        if (localStorage.getItem('flashcard_theme') === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Prevents mobile browser pull-to-refresh and bounce */
        body {
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Card Transition Animations */
        @keyframes cardNext {
            0% { opacity: 0; transform: translateX(40px) scale(0.95); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes cardPrev {
            0% { opacity: 0; transform: translateX(-40px) scale(0.95); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }
        .anim-next { animation: cardNext 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .anim-prev { animation: cardPrev 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        /* Hide scrollbar for smooth horizontal scrolling */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-200 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- SVGs / Icons ---
        const Icon = ({ children, size = 24, fill = "none", stroke = "currentColor", className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={stroke} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const ChevronLeft = ({size}) => <Icon size={size}><polyline points="15 18 9 12 15 6"></polyline></Icon>;
        const ChevronRight = ({size}) => <Icon size={size}><polyline points="9 18 15 12 9 6"></polyline></Icon>;
        const RotateCcw = ({size}) => <Icon size={size}><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></Icon>;
        const Settings = ({size}) => <Icon size={size}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></Icon>;
        const AlertCircle = ({size, className}) => <Icon size={size} className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></Icon>;
        const Upload = ({size, className}) => <Icon size={size} className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></Icon>;
        const FileCode = ({size}) => <Icon size={size}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><polyline points="10 13 8 15 10 17"></polyline><polyline points="14 13 16 15 14 17"></polyline></Icon>;
        const MenuIcon = ({size}) => <Icon size={size}><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></Icon>;
        const X = ({size}) => <Icon size={size}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></Icon>;
        const Trash2 = ({size, className}) => <Icon size={size} className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></Icon>;
        const BookOpen = ({size, className}) => <Icon size={size} className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></Icon>;
        const Clock = ({size, className}) => <Icon size={size} className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></Icon>;
        const Edit2 = ({size, className}) => <Icon size={size} className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></Icon>;
        const Home = ({size, className}) => <Icon size={size} className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></Icon>;
        const Sun = ({size, className}) => <Icon size={size} className={className}><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></Icon>;
        const Moon = ({size, className}) => <Icon size={size} className={className}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></Icon>;
        const Smartphone = ({size, className}) => <Icon size={size} className={className}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></Icon>;
        const Monitor = ({size, className}) => <Icon size={size} className={className}><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></Icon>;
        const Star = ({size, fill, className}) => <Icon size={size} fill={fill} className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></Icon>;
        const Bookmark = ({size, className, fill}) => <Icon size={size} className={className} fill={fill}><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></Icon>;
        const GripVertical = ({size, className}) => <Icon size={size} className={className}><circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="19" r="1"></circle></Icon>;

        // --- Main App Component ---
        function App() {
            const [view, setView] = useState('setup'); // 'setup' or 'study'
            
            // App Theme
            const [theme, setTheme] = useState(() => {
                return localStorage.getItem('flashcard_theme') || 'dark';
            });
            const [showSettingsModal, setShowSettingsModal] = useState(false);

            // Load saved decks from localStorage on initialization
            const [savedDecks, setSavedDecks] = useState(() => {
                const saved = localStorage.getItem('flashcard_decks');
                if (saved) {
                    const parsedDecks = JSON.parse(saved);
                    return parsedDecks.map(deck => {
                        if (!deck.folders) {
                            deck.folders = [ { id: 'favs', name: 'Favorites', cardIds: deck.favorites || [] } ];
                            delete deck.favorites;
                        }
                        return deck;
                    });
                }
                return [];
            });
            const [currentDeckId, setCurrentDeckId] = useState(null);

            const [allCards, setAllCards] = useState([]);
            const [folders, setFolders] = useState([]); // [{id, name, cardIds}]
            const [defaultFolderIds, setDefaultFolderIds] = useState([]); // Quick Save targets (excludes 'favs')
            const [filter, setFilter] = useState('all'); // 'all' or folder.id
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [subjectLabel, setSubjectLabel] = useState('PHYS');
            const [docLabel, setDocLabel] = useState('CH10_12_SG');
            
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [slideDirection, setSlideDirection] = useState('next');
            const [error, setError] = useState('');
            const [isDragging, setIsDragging] = useState(false);
            
            const [editingCard, setEditingCard] = useState(null); 
            const [showFolderSettings, setShowFolderSettings] = useState(false); 
            const [newFolderName, setNewFolderName] = useState('');

            // Drag & Drop Refs
            const dragItem = useRef(null);
            const dragOverItem = useRef(null);

            // Sync theme to document class
            useEffect(() => {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                localStorage.setItem('flashcard_theme', theme);
            }, [theme]);

            // Auto-save progress, folder data, and card edits to localStorage
            useEffect(() => {
                if (currentDeckId && allCards.length > 0) {
                    setSavedDecks(prevDecks => {
                        const updatedDecks = prevDecks.map(deck => {
                            if (deck.id === currentDeckId) {
                                return { 
                                    ...deck, 
                                    currentIndex, 
                                    folders,
                                    defaultFolderIds,
                                    cards: allCards,
                                    lastAccessed: Date.now()
                                };
                            }
                            return deck;
                        });
                        localStorage.setItem('flashcard_decks', JSON.stringify(updatedDecks));
                        return updatedDecks;
                    });
                }
            }, [currentIndex, folders, defaultFolderIds, currentDeckId, allCards]);

            // Derived state: compute which cards should currently be displayed based on filter
            const activeCards = filter === 'all' 
                ? allCards 
                : (folders.find(f => f.id === filter)?.cardIds || []).map(id => allCards.find(c => c.id === id)).filter(Boolean);

            // Ensure currentIndex stays within bounds if cards are removed
            useEffect(() => {
                if (activeCards.length > 0 && currentIndex >= activeCards.length) {
                    setCurrentIndex(Math.max(0, activeCards.length - 1));
                }
            }, [activeCards.length, currentIndex]);

            // Keyboard navigation
            useEffect(() => {
                const handleKeyDown = (e) => {
                    // Disable keyboard nav if we are not studying or a modal is open
                    if (view !== 'study' || editingCard || showSettingsModal || showFolderSettings) return; 
                    
                    if (e.key === 'ArrowRight') {
                        handleNext();
                    } else if (e.key === 'ArrowLeft') {
                        handlePrev();
                    } else if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === ' ') {
                        e.preventDefault();
                        setIsFlipped((prev) => !prev);
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [view, currentIndex, activeCards.length, editingCard, showSettingsModal, showFolderSettings]);

            // File Upload Handlers
            const handleDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
            const handleDragLeave = (e) => { e.preventDefault(); setIsDragging(false); };
            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                const file = e.dataTransfer.files[0];
                if (file) processFile(file);
            };
            const handleFileInput = (e) => {
                const file = e.target.files[0];
                if (file) processFile(file);
            };

            const loadDeck = (deck) => {
                setAllCards(deck.cards);
                setSubjectLabel(deck.subjectLabel);
                setDocLabel(deck.docLabel);
                setFolders(deck.folders || [ { id: 'favs', name: 'Favorites', cardIds: [] } ]);
                setDefaultFolderIds(deck.defaultFolderIds || []); // Reset defaults locally per deck
                setCurrentIndex(deck.currentIndex || 0);
                setCurrentDeckId(deck.id);
                setFilter('all');
                setSlideDirection('next');
                setView('study');
                
                // Update last accessed immediately
                setSavedDecks(prev => {
                    const updated = prev.map(d => d.id === deck.id ? { ...d, lastAccessed: Date.now() } : d);
                    localStorage.setItem('flashcard_decks', JSON.stringify(updated));
                    return updated;
                });
            };

            const deleteDeck = (id, e) => {
                e.stopPropagation();
                if (window.confirm("Are you sure you want to delete this saved deck?")) {
                    setSavedDecks(prev => {
                        const newDecks = prev.filter(d => d.id !== id);
                        localStorage.setItem('flashcard_decks', JSON.stringify(newDecks));
                        return newDecks;
                    });
                    if (currentDeckId === id) {
                        setAllCards([]);
                        setCurrentDeckId(null);
                    }
                }
            };

            const processFile = (file) => {
                setError('');
                
                if (!file.name.toLowerCase().endsWith('.html')) {
                    setError('Please upload a valid .html file.');
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                const content = e.target.result;
                try {
                    const arrayStartIndicator = 'const cardsData = [';
                    const startIdx = content.indexOf(arrayStartIndicator);
                    if (startIdx === -1) throw new Error("Could not find 'cardsData' array in the file.");
                    
                    const endIdx = content.indexOf('const subjectLabel =', startIdx);
                    if (endIdx === -1) throw new Error("Could not find the end of the 'cardsData' array.");

                    let arrayString = content.substring(startIdx + arrayStartIndicator.length - 1, endIdx).trim();
                    if (arrayString.endsWith(';')) arrayString = arrayString.slice(0, -1);

                    const parsedCards = new Function('return ' + arrayString)();
                    
                    if (!Array.isArray(parsedCards) || parsedCards.length === 0) {
                        throw new Error("The extracted data is not a valid array of flashcards.");
                    }

                    const parsedCardsWithIds = parsedCards.map((c, i) => ({ ...c, id: `card_${Date.now()}_${i}` }));

                    const subjectMatch = content.match(/const\s+subjectLabel\s*=\s*["']([^"']+)["']/);
                    const docMatch = content.match(/const\s+docLabel\s*=\s*["']([^"']+)["']/);

                    const newSubjectLabel = subjectMatch ? subjectMatch[1] : 'SUBJ';
                    const newDocLabel = docMatch ? docMatch[1] : 'DOC';

                    const newDeck = {
                        id: 'deck_' + Date.now(),
                        name: newDocLabel !== 'DOC' ? newDocLabel : file.name.replace('.html', ''),
                        subjectLabel: newSubjectLabel,
                        docLabel: newDocLabel,
                        cards: parsedCardsWithIds,
                        folders: [ { id: 'favs', name: 'Favorites', cardIds: [] } ],
                        defaultFolderIds: [],
                        currentIndex: 0,
                        lastAccessed: Date.now()
                    };

                    setSavedDecks(prev => {
                        const updated = [newDeck, ...prev];
                        localStorage.setItem('flashcard_decks', JSON.stringify(updated));
                        return updated;
                    });

                    loadDeck(newDeck);

                } catch (err) {
                    setError(err.message || 'Failed to parse the file. Ensure it is formatted correctly.');
                    console.error(err);
                }
                };
                reader.onerror = () => setError('Failed to read the file.');
                reader.readAsText(file);
            };

            const handleNext = () => {
                if (currentIndex < activeCards.length - 1) {
                    setSlideDirection('next');
                    setIsFlipped(false);
                    setTimeout(() => setCurrentIndex((prev) => prev + 1), 150);
                }
            };

            const handlePrev = () => {
                if (currentIndex > 0) {
                    setSlideDirection('prev');
                    setIsFlipped(false);
                    setTimeout(() => setCurrentIndex((prev) => prev - 1), 150);
                }
            };

            // ---- Folder Management ----
            const addNewFolder = (name) => {
                const newFolderId = 'folder_' + Date.now();
                const newFolder = { id: newFolderId, name, cardIds: [] };
                setFolders(prev => [...prev, newFolder]);
                setDefaultFolderIds(prev => [...prev, newFolderId]); // Auto-set new folders as default target
            };

            const deleteFolder = (folderId) => {
                if (folderId === 'favs') return; // Protect favorites folder
                if (window.confirm("Delete this folder? The flashcards inside will NOT be deleted from your deck.")) {
                    setFolders(prev => prev.filter(f => f.id !== folderId));
                    setDefaultFolderIds(prev => prev.filter(id => id !== folderId));
                    if (filter === folderId) setFilter('all');
                }
            };

            const handleToggleFavorite = (e, cardId) => {
                e.stopPropagation();
                setFolders(prevFolders => prevFolders.map(folder => {
                    if (folder.id === 'favs') {
                        const hasCard = folder.cardIds.includes(cardId);
                        return { ...folder, cardIds: hasCard ? folder.cardIds.filter(id => id !== cardId) : [...folder.cardIds, cardId] };
                    }
                    return folder;
                }));
            };

            // Quick Save logic based on pre-selected custom defaults
            const handleQuickSave = (e, cardId) => {
                e.stopPropagation();
                if (defaultFolderIds.length === 0) {
                    alert("Please select at least one default custom folder in the Sidebar Settings.");
                    setShowFolderSettings(true);
                    return;
                }
                
                // Check if card is in ALL default custom folders
                const isInAllDefaults = defaultFolderIds.every(fId => {
                    const folder = folders.find(f => f.id === fId);
                    return folder && folder.cardIds.includes(cardId);
                });

                setFolders(prevFolders => prevFolders.map(folder => {
                    if (defaultFolderIds.includes(folder.id)) {
                        if (isInAllDefaults) {
                            // Remove from defaults
                            return { ...folder, cardIds: folder.cardIds.filter(id => id !== cardId) };
                        } else {
                            // Add to defaults
                            if (!folder.cardIds.includes(cardId)) {
                                return { ...folder, cardIds: [...folder.cardIds, cardId] };
                            }
                        }
                    }
                    return folder;
                }));
            };

            // Drag and Drop Sorting for Custom Folders
            const handleSort = () => {
                if (filter === 'all') return;
                const currentFolder = folders.find(f => f.id === filter);
                if (!currentFolder) return;

                const currentCardId = activeCards[currentIndex]?.id;

                const newCardIds = [...currentFolder.cardIds];
                const draggedItemId = newCardIds.splice(dragItem.current, 1)[0];
                newCardIds.splice(dragOverItem.current, 0, draggedItemId);

                setFolders(prev => prev.map(f => f.id === filter ? { ...f, cardIds: newCardIds } : f));
                
                // Readjust currentIndex so the currently viewed card doesn't suddenly change
                if (currentCardId) {
                    const newIndex = newCardIds.indexOf(currentCardId);
                    if (newIndex !== -1) setCurrentIndex(newIndex);
                }

                dragItem.current = null;
                dragOverItem.current = null;
            };

            const saveEditedCard = () => {
                setAllCards(prev => prev.map(c => c.id === editingCard.id ? editingCard : c));
                setEditingCard(null);
            };

            // Swipe Tracking logic
            const touchStartX = useRef(null);
            const touchStartY = useRef(null);
            const isSwiping = useRef(false);

            const onTouchStart = (e) => {
                touchStartX.current = e.touches[0].clientX;
                touchStartY.current = e.touches[0].clientY;
                isSwiping.current = false;
            };

            const onTouchMove = (e) => {
                if (!touchStartX.current || !touchStartY.current) return;
                const diffX = touchStartX.current - e.touches[0].clientX;
                const diffY = touchStartY.current - e.touches[0].clientY;
                if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 10) {
                    isSwiping.current = true;
                }
            };

            const onTouchEnd = (e) => {
                if (!touchStartX.current) return;
                const touchEndX = e.changedTouches[0].clientX;
                const diffX = touchStartX.current - touchEndX;
                if (Math.abs(diffX) > 50 && isSwiping.current) {
                    if (diffX > 0) handleNext();
                    else handlePrev();
                }
                touchStartX.current = null;
                touchStartY.current = null;
            };

            const handleCardTap = () => {
                if (!isSwiping.current && !editingCard && !showFolderSettings) {
                    setIsFlipped(!isFlipped);
                }
            };

            if (view === 'setup') {
                return (
                <div className="min-h-screen bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-200 p-6 flex flex-col items-center py-12 font-sans overflow-y-auto transition-colors duration-300">
                    
                    {/* Settings Modal */}
                    {showSettingsModal && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/50 dark:bg-black/80 backdrop-blur-sm" onClick={() => setShowSettingsModal(false)}>

                        title="Open Menu"
                    >
                        <MenuIcon size={22} />
                    </button>
                    <div className="flex items-center gap-2">
                        <span className="font-bold text-zinc-900 dark:text-white">Card {activeCards.length > 0 ? currentIndex + 1 : 0}</span>
                        <span className="text-sm text-zinc-500 dark:text-zinc-500">of {activeCards.length}</span>
                    </div>
                    </div>
                    
                    <div className="flex items-center gap-2">
                    <button 
                        onClick={() => setView('setup')}
                        className="p-2 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-full transition-colors text-zinc-500 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-white"
                        title="Return to Dashboard"
                    >
                        <Home size={22} />
                    </button>
                    </div>
                </header>

                {/* Progress Bar (Top) */}
                <div className="w-full h-1 bg-zinc-200 dark:bg-zinc-800 transition-colors duration-300">
                    <div 
                    className="h-full bg-zinc-800 dark:bg-zinc-500 transition-all duration-300 ease-out"
                    style={{ width: `${progress}%` }}
                    />
                </div>

                {/* Main Flashcard Area */}
                <main className="flex-1 flex flex-col items-center justify-center p-4 sm:p-8 relative overflow-hidden">
                    
                    {activeCards.length === 0 ? (
                    <div className="w-full flex flex-col items-center justify-center flex-1 text-zinc-500">
                        <Bookmark size={48} className="mb-4 opacity-20 text-zinc-500" />
                        <p>No cards found in this folder.</p>
                        <button 
                        onClick={() => { setFilter('all'); setSlideDirection('next'); setCurrentIndex(0); }} 
                        className="mt-4 px-4 py-2 bg-zinc-200 dark:bg-zinc-800 hover:bg-zinc-300 dark:hover:bg-zinc-700 text-zinc-800 dark:text-zinc-300 rounded-lg transition-colors font-semibold text-sm"
                        >
                        View All Cards
                        </button>
                    </div>
                    ) : (
                    <div className="w-full flex justify-center items-center flex-1 relative">
                        {/* Desktop Prev Button */}
                        <button 
                        onClick={handlePrev}
                        disabled={currentIndex === 0}
                        className="hidden sm:flex absolute left-4 md:left-8 p-4 bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-full shadow-lg text-zinc-500 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-700 hover:text-zinc-900 dark:hover:text-white disabled:opacity-30 disabled:cursor-not-allowed transition-all active:scale-95 z-10"
                        >
                        <ChevronLeft size={32} />
                        </button>

                        {/* 3D Card Container */}
                        <div 
                        key={currentIndex}
                        className={`relative w-full max-w-lg aspect-[4/3] sm:aspect-[3/2] cursor-pointer group select-none ${slideDirection === 'next' ? 'anim-next' : 'anim-prev'}`}
                        style={{ perspective: '1200px' }}
                        onClick={handleCardTap}
                        onTouchStart={onTouchStart}
                        onTouchMove={onTouchMove}
                        onTouchEnd={onTouchEnd}
                        >
                        {/* Card Inner (Handles 3D Transform) */}
                        <div 
                            className="w-full h-full relative"
                            style={{ 
                            transformStyle: 'preserve-3d', 
                            transition: 'transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1)',
                            transform: isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)'
                            }}
                        >
                            {/* FRONT FACE */}
                            <div 
                            className="absolute inset-0 w-full h-full bg-white dark:bg-zinc-900 rounded-2xl shadow-xl border border-zinc-200 dark:border-zinc-800 flex flex-col p-6 sm:p-8 text-center transition-colors duration-300"
                            style={{ backfaceVisibility: 'hidden' }}
                            >
                            {/* Header Buttons Area */}
                            <div className="absolute top-3 right-3 flex items-center gap-0.5 z-20">
                                <button 
                                    onClick={(e) => { e.stopPropagation(); setEditingCard({...currentCard}); }}
                                    className={`p-2 rounded-full transition-colors text-zinc-400 hover:text-zinc-900 hover:bg-zinc-100 dark:text-zinc-500 dark:hover:text-zinc-300 dark:hover:bg-zinc-800/50`}
                                    title="Edit Card"
                                >
                                    <Edit2 size={20} />
                                </button>
                                <button 
                                    onClick={(e) => handleToggleFavorite(e, currentCard.id)}
                                    className={`p-2 rounded-full transition-colors ${isFavorited ? 'text-yellow-500 dark:text-yellow-400 hover:bg-zinc-100 dark:hover:bg-zinc-800/50' : 'text-zinc-400 hover:text-zinc-900 hover:bg-zinc-100 dark:text-zinc-500 dark:hover:text-zinc-300 dark:hover:bg-zinc-800/50'}`}
                                    title={isFavorited ? "Remove from Favorites" : "Add to Favorites"}
                                >
                                    <Star size={20} fill={isFavorited ? "currentColor" : "none"} />
                                </button>
                                <button 
                                    onClick={(e) => handleQuickSave(e, currentCard.id)}
                                    className={`p-2 rounded-full transition-colors ${isQuickSaved ? 'text-zinc-900 dark:text-white hover:bg-zinc-100 dark:hover:bg-zinc-800/50' : 'text-zinc-400 hover:text-zinc-900 hover:bg-zinc-100 dark:text-zinc-500 dark:hover:text-zinc-300 dark:hover:bg-zinc-800/50'}`}
                                    title="Quick Save to Default Folders"
                                >
                                    <Bookmark size={20} fill={isQuickSaved ? "currentColor" : "none"} />
                                </button>
                            </div>

                            {/* Corner Labels */}
                            <div className="absolute top-5 left-5 text-xs font-mono text-zinc-500 dark:text-zinc-500">{currentIndex + 1}</div>
                            <div className="absolute top-5 right-32 text-xs font-mono text-zinc-500 dark:text-zinc-500 font-bold">{subjectLabel}</div>
                            <div className="absolute bottom-5 left-5 text-xs font-mono text-zinc-500 dark:text-zinc-500">{docLabel}</div>
                            <div className="absolute bottom-5 right-5 text-xs font-mono text-zinc-500 dark:text-zinc-500">{currentCard.sec}</div>
                            
                            <div className="flex-1 overflow-y-auto mt-10 mb-10 px-2 flex flex-col">
                                <h2 className="m-auto text-xl sm:text-2xl md:text-3xl font-bold text-zinc-900 dark:text-white leading-snug">
                                {currentCard.q}
                                </h2>
                            </div>
                            
                            {/* Tap hint */}
                            <div className="absolute bottom-4 left-1/2 -translate-x-1/2 text-zinc-400 dark:text-zinc-500 opacity-0 group-hover:opacity-100 transition-opacity hidden sm:flex items-center gap-1 text-sm">
                                <RotateCcw size={14} /> Tap to flip
                            </div>
                            </div>

                            {/* BACK FACE */}
                            <div 
                            className="absolute inset-0 w-full h-full bg-zinc-50 dark:bg-zinc-800 rounded-2xl shadow-xl border border-zinc-200 dark:border-zinc-700 flex flex-col p-6 sm:p-8 text-center transition-colors duration-300"
                            style={{ backfaceVisibility: 'hidden', transform: 'rotateY(180deg)' }}
                            >
                            {/* Header Buttons Area */}
                            <div className="absolute top-3 right-3 flex items-center gap-0.5 z-20">
                                <button 
                                    onClick={(e) => { e.stopPropagation(); setEditingCard({...currentCard}); }}
                                    className={`p-2 rounded-full transition-colors text-zinc-400 hover:text-zinc-900 hover:bg-zinc-200 dark:text-zinc-400 dark:hover:text-zinc-200 dark:hover:bg-zinc-700`}
                                    title="Edit Card"
                                >
                                    <Edit2 size={20} />
                                </button>
                                <button 
                                    onClick={(e) => handleToggleFavorite(e, currentCard.id)}
                                    className={`p-2 rounded-full transition-colors ${isFavorited ? 'text-yellow-500 dark:text-yellow-400 hover:bg-zinc-200 dark:hover:bg-zinc-700' : 'text-zinc-400 hover:text-zinc-900 hover:bg-zinc-200 dark:text-zinc-500 dark:hover:text-zinc-300 dark:hover:bg-zinc-700'}`}
                                    title={isFavorited ? "Remove from Favorites" : "Add to Favorites"}
                                >
                                    <Star size={20} fill={isFavorited ? "currentColor" : "none"} />
                                </button>
                                <button 
                                    onClick={(e) => handleQuickSave(e, currentCard.id)}
                                    className={`p-2 rounded-full transition-colors ${isQuickSaved ? 'text-zinc-900 dark:text-white hover:bg-zinc-200 dark:hover:bg-zinc-700' : 'text-zinc-400 hover:text-zinc-900 hover:bg-zinc-200 dark:text-zinc-500 dark:hover:text-zinc-300 dark:hover:bg-zinc-700'}`}
                                    title="Quick Save to Default Folders"
                                >
                                    <Bookmark size={20} fill={isQuickSaved ? "currentColor" : "none"} />
                                </button>
                            </div>

                            {/* Corner Labels */}
                            <div className="absolute top-5 left-5 text-xs font-mono text-zinc-500 dark:text-zinc-400">{currentIndex + 1}</div>
                            <div className="absolute top-5 right-32 text-xs font-mono text-zinc-500 dark:text-zinc-400 font-bold">{subjectLabel}</div>
                            <div className="absolute bottom-5 left-5 text-xs font-mono text-zinc-500 dark:text-zinc-400">{docLabel}</div>
                            <div className="absolute bottom-5 right-5 text-xs font-mono text-zinc-500 dark:text-zinc-400">{currentCard.sec}</div>
                            
                            <div className="flex-1 overflow-y-auto mt-10 mb-10 px-2 flex flex-col">
                                <p className="m-auto text-lg sm:text-xl md:text-2xl text-zinc-800 dark:text-zinc-100 font-bold leading-relaxed">
                                {currentCard.a}
                                </p>
                            </div>
                            </div>
                        </div>
                        </div>

                        {/* Desktop Next Button */}
                        <button 
                        onClick={handleNext}
                        disabled={currentIndex === activeCards.length - 1}
                        className="hidden sm:flex absolute right-4 md:right-8 p-4 bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-full shadow-lg text-zinc-500 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-700 hover:text-zinc-900 dark:hover:text-white disabled:opacity-30 disabled:cursor-not-allowed transition-all active:scale-95 z-10"
                        >
                        <ChevronRight size={32} />
                        </button>
                    </div>
                    )}

                    {/* Bottom Navigation Slider */}
                    {activeCards.length > 0 && (
                    <div className="w-full max-w-lg mt-8 mb-4 sm:mb-0 flex flex-col gap-3 z-10 px-2">
                        <div className="flex justify-between items-center text-xs font-bold text-zinc-600 dark:text-zinc-400">
                        <span className="w-8">1</span>
                        <span className="text-zinc-800 bg-white border border-zinc-200 dark:text-zinc-200 dark:bg-zinc-800 dark:border-zinc-700 px-3 py-1.5 rounded-full shadow-sm tracking-wide transition-colors duration-300">
                            SECTION {currentCard.sec || 'N/A'}
                        </span>
                        <span className="w-8 text-right">{activeCards.length}</span>
                        </div>
                        <input
                        type="range"
                        min={0}
                        max={activeCards.length > 0 ? activeCards.length - 1 : 0}
                        value={currentIndex}
                        onChange={(e) => {
                            const newIndex = Number(e.target.value);
                            setSlideDirection(newIndex > currentIndex ? 'next' : 'prev');
                            setCurrentIndex(newIndex);
                            setIsFlipped(false);
                        }}
                        className="w-full h-2.5 bg-zinc-200 dark:bg-zinc-800 rounded-lg appearance-none cursor-pointer accent-zinc-600 dark:accent-zinc-400 focus:outline-none focus:ring-4 focus:ring-zinc-500/30 transition-all duration-300"
                        />
                    </div>
                    )}

                </main>

                {/* Mobile Footer Guide */}
                <footer className="sm:hidden bg-white dark:bg-zinc-900 border-t border-zinc-200 dark:border-zinc-800 p-4 text-center text-sm text-zinc-500 dark:text-zinc-400 flex justify-between items-center pb-8 transition-colors duration-300">
                    <span>← Swipe Prev</span>
                    <span className="flex items-center gap-1 font-bold"><RotateCcw size={14} /> Tap to Flip</span>
                    <span>Swipe Next →</span>
                </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
